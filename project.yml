name: HapticGen
options:
  bundleIdPrefix: com.sakuzy
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

targets:
  HapticGen:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Haptic Gen
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSSupportsOpeningDocumentsInPlace: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: Haptic Trailer
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.zip-archive
            LSHandlerRank: Alternate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sakuzy.HapticGen
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: Sources/Info.plist
    dependencies:
      - sdk: CoreHaptics.framework
      - sdk: AVFoundation.framework
      - sdk: Accelerate.framework
      - package: ZIPFoundation
        product: ZIPFoundation

  HapticGenTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HapticGen
